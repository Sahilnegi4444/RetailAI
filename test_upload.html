<!DOCTYPE html>
<html>
<head>
    <title>Upload Test</title>
</head>
<body>
    <h1>Direct Upload Test</h1>
    
    <h2>Test 1: Simple Form Upload</h2>
    <form action="http://localhost:5016/api/test-upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".csv,.xlsx,.xls" required>
        <input type="text" name="year" value="2026" placeholder="Year">
        <input type="text" name="month" value="3" placeholder="Month">
        <input type="text" name="category" value="Grocery" placeholder="Category">
        <button type="submit">Test Upload</button>
    </form>
    
    <h2>Test 2: Actual Upload</h2>
    <form action="http://localhost:5016/api/upload-data" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".csv,.xlsx,.xls" required>
        <input type="text" name="year" value="2026" placeholder="Year">
        <input type="text" name="month" value="3" placeholder="Month">
        <input type="text" name="category" value="Grocery" placeholder="Category">
        <button type="submit">Real Upload</button>
    </form>
    
    <h2>JavaScript Test</h2>
    <input type="file" id="jsFile" accept=".csv,.xlsx,.xls">
    <button onclick="testJSUpload()">JS Upload Test</button>
    
    <script>
        function testJSUpload() {
            const fileInput = document.getElementById('jsFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('year', '2026');
            formData.append('month', '3');
            formData.append('category', 'Grocery');
            
            console.log('Uploading:', file.name);
            console.log('FormData entries:');
            for (let [key, value] of formData.entries()) {
                console.log(key, value);
            }
            
            fetch('http://localhost:5016/api/test-upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('Response:', data);
                alert('Response: ' + JSON.stringify(data));
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error: ' + error);
            });
        }
    </script>
</body>
</html>
