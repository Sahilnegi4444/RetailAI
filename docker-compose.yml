version: '3.8'

services:
  # Backend API - Retail Prediction API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: retail-prediction-api
    ports:
      - "8001:8001"
    volumes:
      - ./inventory_model/data:/app/inventory_model/data
      - ./inventory_model_secondary/data:/app/inventory_model_secondary/data
      - ./inventory_model/models:/app/inventory_model/models
      - ./inventory_model_secondary/models:/app/inventory_model_secondary/models
    environment:
      - PYTHONPATH=/app
      - HOST=0.0.0.0
      - PORT=8001
      - ENVIRONMENT=production
    restart: unless-stopped
    networks:
      - retail-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - Retail Prediction Dashboard
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: retail-prediction-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8001
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - retail-network

  # Nginx Reverse Proxy - Retail Prediction WebApp
  nginx:
    image: nginx:alpine
    container_name: retail-prediction-webapp
    ports:
      - "5015:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - retail-network
    labels:
      - "com.retail.app.name=Retail Prediction webApp"
      - "com.retail.app.port=5015"

networks:
  retail-network:
    driver: bridge
    name: retail-prediction-network