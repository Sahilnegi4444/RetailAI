version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: retail-api
    expose:
      - "8001"
    networks:
      - retail-network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: retail-web
    ports:
      - "5015:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - retail-network

networks:
  retail-network: