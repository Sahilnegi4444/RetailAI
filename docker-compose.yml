version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: retail-api
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - DATABASE_PATH=/app/converted_dataset/inventory_sales.db
      - PYTHONUNBUFFERED=1
    volumes:
      - ./converted_dataset:/app/converted_dataset
      - ./inventory_model_secondary/models:/app/inventory_model_secondary/models
    expose:
      - "8001"
    networks:
      - retail-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: retail-web
    ports:
      - "5015:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - retail-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  retail-network:
    driver: bridge
