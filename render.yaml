services:
  # Backend API Service
  - type: web
    name: inventory-api
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python inventory_model_secondary/src/api_business_focused.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8001
    healthCheckPath: /